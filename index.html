<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Noctiluca Pages</title>
  <style>
    :root {
      --bg: #12100e;
      --ink: #f7efe4;
      --muted: #b9aa98;
      --line: rgba(255,255,255,.14);
      --accent: #4cc7b8;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      background: radial-gradient(circle at 50% 0%, #2a2119, transparent 38%), var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    main {
      width: min(760px, 100%);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(48px, 12vw, 92px);
      line-height: .95;
    }
    p {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }
    a {
      display: block;
      margin-top: 28px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      background: rgba(255,255,255,.05);
    }
    a strong {
      display: block;
      margin-bottom: 6px;
      color: var(--accent);
      font-size: 22px;
    }
    a span {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>Noctiluca Pages</h1>
    <p>一个放零散静态网页的小站。每个页面都尽量做成适合直接阅读和分享的独立网页。</p>
    <a href="sites/zhishendingnei/">
      <strong>置身钉内</strong>
      <span>PDF 长文重排版，面向网页和手机阅读。</span>
    </a>
  </main>
</body>
</html>
